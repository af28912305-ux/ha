<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Priority Access: Habiba</title>
    <style>
        body {
            background-color: #0d0d0d;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        .container {
            text-align: center;
        }

        .message {
            color: #ffffff;
            font-size: 3rem;
            font-weight: bold;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 1.5s forwards ease-out;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3),
                         0 0 20px rgba(255, 105, 180, 0.5);
        }

        .habiba {
            color: #ff4d94;
            display: block;
            font-size: 4rem;
            margin-top: 10px;
            animation: glow 2s infinite alternate;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes glow {
            from {
                text-shadow: 0 0 10px #ff4d94, 0 0 20px #ff4d94;
            }
            to {
                text-shadow: 0 0 20px #ff4d94, 0 0 40px #ff4d94, 0 0 60px #ffb3d1;
            }
        }

        /* تأثير الخلفية التقنية */
        .grid {
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(255, 255, 255, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 255, 255, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg);
            bottom: -50%;
            z-index: -1;
            animation: moveGrid 10s linear infinite;
        }

        @keyframes moveGrid {
            from { background-position: 0 0; }
            to { background-position: 0 1000px; }
        }
    </style>
</head>
<body>

    <div class="grid"></div>

    <div class="container">
        <div class="message">
            I LOVE YOU SO MUCH
            <span class="habiba">HABIBA 💗</span>
        </div>
    </div>

</body>
</html>
